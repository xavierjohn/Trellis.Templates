name: Build

on:
  workflow_dispatch:
  push:
    branches: [ main, release/v** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        
    - name: Setup versioning
      uses: dotnet/nbgv@master
      with:
        setAllVars: true

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore template/TrellisAspTemplate.slnx

    - name: Build
      run: dotnet build template/TrellisAspTemplate.slnx --no-restore -c Release

    - name: Test with Coverage
      # --coverage: Native MTP coverage (requires Microsoft.Testing.Extensions.CodeCoverage)
      # --report-trx: Native MTP TRX generation (requires Microsoft.Testing.Extensions.TrxReport)
      working-directory: template
      run: |
        dotnet test --solution TrellisAspTemplate.slnx --no-build -c Release \
          --filter-not-trait "Category=Integration" \
          --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml \
          --report-trx

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          **/TestResults/**/*.trx

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      with:
        files: ./**/*.cobertura.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

    - name: Pack template
      if: ${{ success() && !github.base_ref }}
      run: dotnet pack templatepack.csproj -c Release -o nupkg

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: ${{ success() && !github.base_ref }}
      with:
        name: artifact
        path: nupkg/*.nupkg
