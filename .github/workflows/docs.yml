# Builds the DocFX documentation site and (on manual dispatch) publishes it to GitHub Pages.
#
# Push / PR: build and validate the site — broken links fail the build (--warningsAsErrors).
# Manual run (Actions -> Docs -> Run workflow): also deploy to GitHub Pages. Enable Pages first under
# Settings -> Pages -> Source: GitHub Actions. (GitHub Pages on a private repo needs a paid plan; once the
# repository is public you can switch the deploy job's trigger to push for publish-on-merge.)
name: Docs

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', '.github/workflows/docs.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'docs/**', '.github/workflows/docs.yml' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build site
        run: docfx docs/docfx.json --warningsAsErrors

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    name: deploy to Pages
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
