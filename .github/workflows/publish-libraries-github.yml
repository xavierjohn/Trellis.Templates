# Manual publish of the resource-naming libraries to this account's GitHub Packages NuGet feed (alpha channel).
#
# Uses the built-in GITHUB_TOKEN (no stored secret). The version is the static VersionPrefix/VersionSuffix from
# src/Directory.Build.props. This is the internal/alpha channel; for the public, stable nuget.org release use
# publish-libraries.yml (Trusted Publishing). Packs Trellis.ResourceNaming.Abstractions and
# Trellis.ResourceNaming.Azure (the test project is not packable).
name: Publish libraries to GitHub Packages

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: github-packages libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build + test (gate)
        run: |
          dotnet build src/Trellis.ResourceNaming.slnx -c Release
          dotnet test src/Trellis.ResourceNaming.slnx --no-build -c Release

      - name: Pack
        run: dotnet pack src/Trellis.ResourceNaming.slnx -c Release -o nupkg

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate
