# Trellis Template Capability-Parity Manifest
# Single source of truth for the cross-cutting capabilities every Trellis template MUST implement.
# CI instantiates each template (dotnet new), builds it, optionally boots it, and asserts each
# required capability's checks. A missing/failed capability fails the build — drift is caught by CI,
# not by human discipline. The human-readable parity matrix is GENERATED from this file.

templates:
  asp:
    new: trellis-asp
    boot: { project: Api, urlPath: "/openapi/2026-03-26.json" }   # placeholder boot target
  microservices:
    new: trellis-microservices
    boot: { project: Members, port: 5003 }

# check kinds:
#   source-contains  - regex must match in the instantiated tree (glob scopes files; anyOf = OR)
#   http-status      - boot the project, issue request, assert status   ({version} expands per template)
#   package-referenced - a PackageReference exists
#   builds           - the instantiated solution builds (global)
#   docs-in-sync     - .github/trellis/* equals the canonical conventions source (global)

capabilities:

  api-versioning:
    title: Date-based API versioning
    requiredFor: [asp, microservices]
    docs: conventions/api-versioning.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddApiVersioning" }
      - kind: source-contains   # endpoints/controllers are version-bound
        anyOf:
          - { glob: "**/*Endpoints.cs", pattern: "MapToApiVersion" }            # minimal API
          - { glob: "**/Controllers/**/*.cs", pattern: "v20\\d{2}_\\d{2}_\\d{2}" } # versioned namespace (MVC)
      - { kind: http-status, request: "GET {version}", expect: 200, desc: "per-version OpenAPI doc serves" }

  sli:
    title: Service Level Indicators
    requiredFor: [asp, microservices]
    docs: conventions/sli.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddServiceLevelIndicator" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "UseServiceLevelIndicator" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddServiceLevelIndicatorInstrumentation" }

  idempotency:
    title: Idempotent writes
    requiredFor: [asp, microservices]
    docs: conventions/idempotency.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddTrellisIdempotency" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "UseTrellisIdempotency" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "IdempotentAttribute|\\[Idempotent\\]" }

  problem-details:
    title: RFC 9457 ProblemDetails
    requiredFor: [asp, microservices]
    docs: conventions/problem-details.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddProblemDetails" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "UseExceptionHandler" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "CustomizeProblemDetails" }

  scalar-validation:
    title: Scalar value-object validation (422 on bad VO bind)
    requiredFor: [asp, microservices]
    docs: conventions/scalar-validation.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddTrellisAspWithScalarValidation|AddScalarValueValidation" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "UseScalarValueValidation" }

  openapi-scalar:
    title: OpenAPI document + Scalar UI
    requiredFor: [asp, microservices]
    docs: conventions/openapi.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddOpenApi" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "MapScalarApiReference" }
      - { kind: http-status, request: "GET {version}", expect: 200 }

  observability:
    title: OpenTelemetry + exported mediator spans + business-event logging
    requiredFor: [asp, microservices]
    docs: conventions/observability.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddOpenTelemetry" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "WithTracing" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "[Ll]ogging\\.AddOpenTelemetry" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddSource\\(\"Trellis.Mediator\"\\)", desc: "mediator spans actually exported" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "LoggerMessage", desc: "handlers emit structured business events" }

  authorization:
    title: Actor-based authorization
    requiredFor: [asp, microservices]
    docs: conventions/authorization.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddResourceAuthorization|AddTrellisBehaviors" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "IAuthorize|RequiredPermissions" }

  mediator-pipeline:
    title: Trellis mediator pipeline
    requiredFor: [asp, microservices]
    docs: conventions/mediator.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddMediator" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddTrellisBehaviors" }

  health-checks:
    title: Health endpoints
    requiredFor: [asp, microservices]
    docs: conventions/health.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "MapHealthChecks|MapDefaultEndpoints" }
      - { kind: http-status, request: "GET /health", expect: 200, env: Development }

  resource-naming:
    title: Convention-based Azure resource naming
    requiredFor: [asp, microservices]
    status: planned   # lands with the Trellis.ResourceNaming.Azure package
    docs: conventions/resource-naming.md
    checks:
      - { kind: package-referenced, package: "Trellis.ResourceNaming.Azure" }
      - { kind: source-contains, glob: "**/*.cs", pattern: "IResourceNamer" }

  # --- template-specific (still tracked, but not cross-cutting) -------------------------------
  aspire-servicedefaults:
    title: Aspire AppHost + ServiceDefaults
    requiredFor: [microservices]
    docs: conventions/aspire.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "AddServiceDefaults" }
      - { kind: source-contains, glob: "**/*.csproj", pattern: "Aspire" }

  efcore-conventions:
    title: Trellis EF Core conventions
    requiredFor: [asp]
    docs: conventions/efcore.md
    checks:
      - { kind: source-contains, glob: "**/*.cs", pattern: "ApplyTrellisConventionsFor|AddTrellisInterceptors" }

global-checks:
  - { kind: builds, config: Release, expect: { warnings: 0, errors: 0 } }
  - { kind: docs-in-sync, command: "trellis-conventions sync --check" }
